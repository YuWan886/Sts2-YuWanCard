name: Create Release

on:
  push:
    tags:
    - '*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        type: string
      release_title:
        description: '发布标题 (可选)'
        required: false
        type: string
      is_prerelease:
        description: '是否为预发布版本'
        required: false
        default: false
        type: boolean
      generate_notes:
        description: '自动生成发布说明'
        required: false
        default: true
        type: boolean

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # 手动触发时检出指定版本
        ref: ${{ github.event.inputs.version || github.ref }}

    - name: Set Release Variables
      id: vars
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "TAG_NAME=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=${{ github.event.inputs.is_prerelease }}" >> $GITHUB_OUTPUT
          echo "GENERATE_NOTES=${{ github.event.inputs.generate_notes }}" >> $GITHUB_OUTPUT
          if [[ -n "${{ github.event.inputs.release_title }}" ]]; then
            echo "RELEASE_TITLE=${{ github.event.inputs.release_title }}" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_TITLE=Release ${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi
        else
          echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          echo "GENERATE_NOTES=true" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Check if Tag Exists
      run: |
        if ! git rev-parse "${{ steps.vars.outputs.TAG_NAME }}" >/dev/null 2>&1; then
          echo "❌ 错误：标签 ${{ steps.vars.outputs.TAG_NAME }} 不存在"
          echo "请先创建标签：git tag ${{ steps.vars.outputs.TAG_NAME }} && git push origin ${{ steps.vars.outputs.TAG_NAME }}"
          exit 1
        fi
        echo "✅ 标签存在：${{ steps.vars.outputs.TAG_NAME }}"

    - name: Generate Release Notes
      id: release_notes
      run: |
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        echo "## 更新内容" > release_notes.md
        echo "" >> release_notes.md
        
        if [ -n "$PREVIOUS_TAG" ]; then
          echo "自 $PREVIOUS_TAG 以来的更改：" >> release_notes.md
          echo "" >> release_notes.md
          
          git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --reverse >> release_notes.md
          echo "" >> release_notes.md
        else
          echo "首次发布" >> release_notes.md
          echo "" >> release_notes.md
          
          git log --pretty=format:"- %s by @%an ([%h](https://github.com/${{ github.repository }}/commit/%H))" --reverse >> release_notes.md
          echo "" >> release_notes.md
        fi
        
        echo "" >> release_notes.md
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG:-HEAD}...${{ steps.vars.outputs.TAG_NAME }}" >> release_notes.md
        
        echo "RELEASE_NOTES_FILE=release_notes.md" >> $GITHUB_OUTPUT

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASE_CMD="gh release create \"${{ steps.vars.outputs.TAG_NAME }}\" \
          --repo=\"${{ github.repository }}\" \
          --title=\"${{ steps.vars.outputs.RELEASE_TITLE }}\" \
          --notes-file=\"${{ steps.release_notes.outputs.RELEASE_NOTES_FILE }}\""
        
        if [[ "${{ steps.vars.outputs.IS_PRERELEASE }}" == "true" ]]; then
          RELEASE_CMD="$RELEASE_CMD --prerelease"
        fi
        
        echo "执行命令：$RELEASE_CMD"
        eval $RELEASE_CMD
        
        echo "✅ Release 创建成功：${{ steps.vars.outputs.TAG_NAME }}"
